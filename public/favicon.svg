<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="10" fill="#0a0a0a"/>
  <!-- nodo superior -->
  <circle cx="32" cy="14" r="3.5" fill="#E8B4C8"/>
  <!-- nodo inferior izquierdo -->
  <circle cx="16" cy="46" r="3.5" fill="#7E5BAE"/>
  <!-- nodo inferior derecho -->
  <circle cx="48" cy="46" r="3.5" fill="#7E5BAE"/>
  <!-- líneas de conexión -->
  <line x1="32" y1="14" x2="16" y2="46" stroke="#7E5BAE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="48" y2="46" stroke="#7E5BAE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="46" x2="48" y2="46" stroke="#7E5BAE" stroke-width="1.5" stroke-linecap="round"/>
  <!-- iniciales AY centradas -->
  <text x="32" y="36" font-family="Arial,sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">AY</text>
</svg>